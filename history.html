<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="bilder/logotab.png" type="image/png">
    <title>Syntaxify History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="design.css">
</head>
<body data-require-auth="true">
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="startseite.html">
               <img src="bilder/logonav.png" alt="Brogram Logo" height="50">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item"><a class="nav-link" href="hauptmenue.html" data-i18n="nav_editor">Editor</a></li>
                    <li class="nav-item"><a class="nav-link" href="aufgaben.html" data-i18n="nav_tasks">Tasks</a></li>
                    <li class="nav-item ms-lg-3">
                        <button class="btn btn-bb px-4" data-auth="profile-name" data-i18n="nav_profile">My Profile</button>
                        <button class="btn btn-bb px-4 ms-2" data-auth="logout" data-i18n="nav_logout">Logout</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <section class="divfarbe rounded-4 shadow p-4 text-white mb-4">
            <div class="d-flex flex-wrap justify-content-between align-items-start gap-3">
                <div>
                    <h1 class="fw-bold mb-2" data-i18n="history_title">History</h1>
                    <p class="mb-0 text-secondary" data-i18n="history_description">All saved snapshots from your account appear here. You can load, rename, or delete them.</p>
                </div>
                <div class="text-end">
                    <div id="historyPageStatus" class="text-secondary" data-i18n="history_loading">loading...</div>
                </div>
            </div>
        </section>

        <section id="historyPageList" class="history-page-grid"></section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="auth.js"></script>
    <script src="history.js"></script>
</body>
</html>
