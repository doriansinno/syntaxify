<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="bilder/logotab.png" type="image/png">
    <title>Syntaxify Tasks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="design.css">
</head>
<body data-require-auth="true">
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="startseite.html">
               <img src="bilder/logonav.png" alt="Brogram Logo" height="50">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item"><a class="nav-link" href="hauptmenue.html" data-i18n="nav_editor">Editor</a></li>
                    <li class="nav-item ms-lg-3">
                        <button class="btn btn-bb px-4" data-auth="profile-name" data-i18n="nav_profile">My Profile</button>
                        <button class="btn btn-bb px-4 ms-2" data-auth="logout" data-i18n="nav_logout">Logout</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <section class="divfarbe rounded-4 shadow p-4 text-white mb-4">
            <div class="d-flex flex-wrap justify-content-between align-items-start gap-3">
                <div>
                    <h1 class="fw-bold mb-2" data-i18n="tasks_title">Tasks</h1>
                    <p class="mb-0 text-secondary" data-i18n="tasks_description">The challenges become harder over time. The syntax stays simple, but the underlying idea should make you think.</p>
                </div>
                <div class="text-end">
                    <div id="taskProgress" class="text-secondary mb-3">0 of 0 completed</div>
                </div>
                <div class="task-filter-wrap">
                    <label class="form-label mb-2" for="difficultyFilter" data-i18n="tasks_difficulty">Difficulty</label>
                    <select id="difficultyFilter" class="form-select">
                        <option value="all" data-i18n="tasks_all">All</option>
                        <option value="easy" data-i18n="tasks_easy">Easy</option>
                        <option value="medium" data-i18n="tasks_medium">Medium</option>
                        <option value="hard" data-i18n="tasks_hard">Hard</option>
                    </select>
                </div>
            </div>
        </section>

        <section id="taskBoard" class="task-grid"></section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="auth.js"></script>
    <script src="aufgaben.js"></script>
</body>
</html>
